<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG · Abalone Flow</title>
<style>
  html, body { margin: 0; padding: 0; background: #14141f; }
  .card {
    width: 1200px;
    height: 630px;
    background:
      radial-gradient(600px circle at 80% 30%, rgba(170, 190, 255, 0.18), transparent 70%),
      radial-gradient(500px circle at 15% 85%, rgba(170, 190, 255, 0.10), transparent 70%),
      #14141f;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    align-items: center;
    padding: 0 96px;
    gap: 72px;
    box-sizing: border-box;
  }
  .pearl {
    width: 280px;
    height: 280px;
    flex-shrink: 0;
    filter: drop-shadow(0 16px 48px rgba(170, 190, 255, 0.28));
  }
  .copy { display: flex; flex-direction: column; gap: 20px; }
  .wordmark {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    opacity: 0.75;
  }
  .headline {
    font-size: 84px;
    font-weight: 600;
    letter-spacing: -0.028em;
    line-height: 1.03;
  }
  .values {
    font-size: 20px;
    font-weight: 400;
    opacity: 0.6;
    letter-spacing: 0.02em;
    display: flex;
    gap: 20px;
    margin-top: 4px;
  }
  .values span::after { content: "·"; margin-left: 20px; opacity: 0.5; }
  .values span:last-child::after { content: ""; margin-left: 0; }
</style>
</head>
<body>
<div class="card">
  <svg class="pearl" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-hidden="true">
    <defs>
      <linearGradient id="pearl" x1="0.5" y1="0" x2="0.5" y2="1">
        <stop offset="0%" stop-color="#f2f4fa"/>
        <stop offset="40%" stop-color="#d8dff0"/>
        <stop offset="100%" stop-color="#b8c2db"/>
      </linearGradient>
      <radialGradient id="spec" cx="32%" cy="28%" r="30%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="iri" cx="60%" cy="65%" r="22%">
        <stop offset="0%" stop-color="#aabeff" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#aabeff" stop-opacity="0"/>
      </radialGradient>
      <clipPath id="rounded"><rect width="512" height="512" rx="80"/></clipPath>
      <filter id="edgeGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>
    <rect width="512" height="512" rx="80" fill="#14141f"/>
    <g clip-path="url(#rounded)">
      <g transform="translate(256 256) scale(1.12) translate(-256 -256)">
        <circle cx="256" cy="272" r="200" fill="url(#pearl)"/>
        <circle cx="256" cy="272" r="200" fill="url(#spec)"/>
        <circle cx="256" cy="272" r="200" fill="url(#iri)"/>
        <path d="M 512 0 L 512 512 L 200 512 Q 160 340 220 200 Q 280 80 400 20 L 512 0 Z" fill="#14141f"/>
        <path d="M 200 512 Q 160 340 220 200 Q 280 80 400 20"
              fill="none" stroke="#c8d7f5" stroke-opacity="0.18"
              stroke-width="12" stroke-linecap="round" filter="url(#edgeGlow)"/>
        <path d="M 200 512 Q 160 340 220 200 Q 280 80 400 20"
              fill="none" stroke="#e1e8fc" stroke-opacity="0.42"
              stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="322" cy="188" r="17" fill="url(#pearl)"/>
        <circle cx="355" cy="266" r="19" fill="url(#pearl)"/>
        <circle cx="352" cy="348" r="17" fill="url(#pearl)"/>
        <g opacity="0.5">
          <circle cx="318" cy="183" r="5.5" fill="#ffffff"/>
          <circle cx="350" cy="261" r="6" fill="#ffffff"/>
          <circle cx="348" cy="343" r="5.5" fill="#ffffff"/>
        </g>
      </g>
    </g>
  </svg>
  <div class="copy">
    <div class="wordmark">Abalone Flow</div>
    <div class="headline">Speak 4× faster<br>than you type.</div>
    <div class="values"><span>Private</span><span>Offline</span><span>Free</span></div>
  </div>
</div>
</body>
</html>
