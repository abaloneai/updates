<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Abalone Flow — Speak 3× faster than you type</title>
    <meta name="description" content="Voice-to-text for your Mac. Hold a key, speak, release. Your words land at the cursor — punctuated, capitalized, instant. Local transcription. Private. Free.">
    <link rel="canonical" href="https://updates.abalone.ai/flow/mac">
    <style>
        :root {
            --bg: #14141f;
            --text: #ffffff;
            --accent: #aabeff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
            text-align: center;
        }
        main {
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .icon {
            width: 128px;
            height: 128px;
            filter: drop-shadow(0 12px 32px rgba(170, 190, 255, 0.18));
            animation: shimmer 8s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { filter: drop-shadow(0 12px 32px rgba(170, 190, 255, 0.18)) brightness(1); }
            50%      { filter: drop-shadow(0 12px 36px rgba(170, 190, 255, 0.26)) brightness(1.04); }
        }
        .wordmark {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.01em;
            opacity: 0.85;
            margin-top: 8px;
        }
        h1 {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.025em;
            line-height: 1.08;
            margin-top: 8px;
        }
        .subhead {
            font-size: 22px;
            font-weight: 400;
            opacity: 0.7;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }
        .cta {
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: linear-gradient(180deg, #f2f4fa 0%, #d8dff0 100%);
            color: #14141f;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
            text-decoration: none;
            border-radius: 999px;
            box-shadow:
                0 8px 24px rgba(170, 190, 255, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }
        .cta:hover {
            transform: translateY(-1px);
            box-shadow:
                0 12px 32px rgba(170, 190, 255, 0.36),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        .cta:active {
            transform: translateY(0);
        }
        .cta svg {
            width: 16px;
            height: 16px;
        }
        .requirements {
            font-size: 13px;
            opacity: 0.5;
            letter-spacing: 0.01em;
        }
        .values {
            margin-top: 16px;
            font-size: 14px;
            opacity: 0.6;
            letter-spacing: 0.02em;
            display: flex;
            gap: 14px;
        }
        .values span::after {
            content: "·";
            margin-left: 14px;
            opacity: 0.5;
        }
        .values span:last-child::after { content: ""; margin-left: 0; }
        footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            opacity: 0.4;
            letter-spacing: 0.02em;
        }
        @media (max-width: 520px) {
            h1 { font-size: 36px; }
            .subhead { font-size: 19px; }
            .icon { width: 104px; height: 104px; }
            footer { position: static; margin-top: 48px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .icon { animation: none; }
            .cta { transition: none; }
        }
    </style>
</head>
<body>
    <main>
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-label="Abalone Flow">
            <defs>
                <linearGradient id="pearl" x1="0.5" y1="0" x2="0.5" y2="1">
                    <stop offset="0%" stop-color="#f2f4fa"/>
                    <stop offset="40%" stop-color="#d8dff0"/>
                    <stop offset="100%" stop-color="#b8c2db"/>
                </linearGradient>
                <radialGradient id="spec" cx="32%" cy="28%" r="30%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="iri" cx="60%" cy="65%" r="22%">
                    <stop offset="0%" stop-color="#aabeff" stop-opacity="0.2"/>
                    <stop offset="100%" stop-color="#aabeff" stop-opacity="0"/>
                </radialGradient>
                <clipPath id="rounded">
                    <rect width="512" height="512" rx="80"/>
                </clipPath>
                <filter id="edgeGlow" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="6"/>
                </filter>
            </defs>
            <rect width="512" height="512" rx="80" fill="#14141f"/>
            <g clip-path="url(#rounded)">
                <g transform="translate(256 256) scale(1.12) translate(-256 -256)">
                    <circle cx="256" cy="272" r="200" fill="url(#pearl)"/>
                    <circle cx="256" cy="272" r="200" fill="url(#spec)"/>
                    <circle cx="256" cy="272" r="200" fill="url(#iri)"/>
                    <path d="M 512 0 L 512 512 L 200 512 Q 160 340 220 200 Q 280 80 400 20 L 512 0 Z" fill="#14141f"/>
                    <path d="M 200 512 Q 160 340 220 200 Q 280 80 400 20"
                          fill="none" stroke="#c8d7f5" stroke-opacity="0.18"
                          stroke-width="12" stroke-linecap="round" filter="url(#edgeGlow)"/>
                    <path d="M 200 512 Q 160 340 220 200 Q 280 80 400 20"
                          fill="none" stroke="#e1e8fc" stroke-opacity="0.42"
                          stroke-width="3.5" stroke-linecap="round"/>
                    <circle cx="322" cy="188" r="17" fill="url(#pearl)"/>
                    <circle cx="355" cy="266" r="19" fill="url(#pearl)"/>
                    <circle cx="352" cy="348" r="17" fill="url(#pearl)"/>
                    <g opacity="0.5">
                        <circle cx="318" cy="183" r="5.5" fill="#ffffff"/>
                        <circle cx="350" cy="261" r="6" fill="#ffffff"/>
                        <circle cx="348" cy="343" r="5.5" fill="#ffffff"/>
                    </g>
                </g>
            </g>
        </svg>

        <div class="wordmark">Abalone Flow</div>

        <h1>Speak 3× faster<br>than you type.</h1>

        <p class="subhead">Anywhere on your Mac.</p>

        <a class="cta" href="https://github.com/abaloneai/updates/releases/download/flow-macos-v1.0.0/AbaloneFlow-1.0.0.dmg">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <path d="M8 1a.75.75 0 0 1 .75.75v7.44l2.47-2.47a.75.75 0 0 1 1.06 1.06l-3.75 3.75a.75.75 0 0 1-1.06 0L3.72 7.78a.75.75 0 0 1 1.06-1.06l2.47 2.47V1.75A.75.75 0 0 1 8 1Zm-6 11.75a.75.75 0 0 1 .75.75V14h10.5v-.5a.75.75 0 0 1 1.5 0v1.25a.75.75 0 0 1-.75.75H2.25a.75.75 0 0 1-.75-.75V13.5a.75.75 0 0 1 .75-.75Z"/>
            </svg>
            Download for Mac
        </a>

        <p class="requirements">macOS 14 Sonoma or later · Apple Silicon</p>

        <div class="values">
            <span>Private</span>
            <span>Offline</span>
            <span>Free</span>
        </div>
    </main>

    <footer>© 2026 Abalone.ai</footer>
</body>
</html>
